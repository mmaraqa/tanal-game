<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مغامرات تنال 🌸</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Tajawal:wght@400;700;900&display=swap');

:root {
  --pink:#FF6B9D; --purple:#9B59B6; --sky:#5DADE2;
  --green:#58D68D; --yellow:#F4D03F; --orange:#E67E22;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:#0d0520;overflow:hidden;width:100vw;height:100vh;user-select:none;touch-action:none;overscroll-behavior:none;-webkit-user-select:none;}

/* SCREENS */
.screen{position:absolute;inset:0;display:none;}
.screen.active{display:flex;}

/* TITLE */
#titleScreen{flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
.stars-bg{position:absolute;inset:0;overflow:hidden;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:.2;transform:scale(1);}to{opacity:1;transform:scale(1.4);}}
.title-container{position:relative;z-index:10;text-align:center;padding:20px;}
.game-title{font-family:'Fredoka One',cursive;font-size:clamp(2.5rem,8vw,5rem);color:white;
  text-shadow:0 0 30px var(--pink),0 0 60px var(--purple),4px 4px 0 rgba(0,0,0,.5);
  animation:titlePulse 2s ease-in-out infinite;margin-bottom:8px;}
@keyframes titlePulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
.title-sub{color:var(--yellow);font-size:clamp(.9rem,3vw,1.4rem);font-weight:900;margin-bottom:30px;text-shadow:2px 2px 0 rgba(0,0,0,.5);}
.title-char{width:160px;height:200px;margin:0 auto 25px;animation:charFloat 3s ease-in-out infinite;}
@keyframes charFloat{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-18px) rotate(2deg);}}
.start-btn{font-family:'Fredoka One',cursive;font-size:1.8rem;padding:15px 55px;
  background:linear-gradient(135deg,var(--pink),var(--purple));color:white;border:none;border-radius:50px;
  cursor:pointer;box-shadow:0 8px 0 #7d3c98,0 10px 20px rgba(0,0,0,.4);
  animation:btnBounce 1.5s ease-in-out infinite;text-shadow:2px 2px 0 rgba(0,0,0,.3);}
@keyframes btnBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.start-btn:active{transform:translateY(4px);box-shadow:0 4px 0 #7d3c98;}
.float-icon{position:absolute;animation:floatUp linear infinite;pointer-events:none;}
@keyframes floatUp{from{transform:translateY(100vh) rotate(0);opacity:0;}10%{opacity:1;}90%{opacity:1;}to{transform:translateY(-100px) rotate(360deg);opacity:0;}}

/* HUD */
#gameHUD{position:fixed;top:0;left:0;right:0;height:68px;
  background:linear-gradient(180deg,rgba(0,0,0,.92) 0%,rgba(0,0,0,.4) 80%,transparent);
  display:flex;align-items:center;justify-content:space-between;padding:8px 16px;z-index:1000;pointer-events:none;}
.hud-lives{display:flex;gap:5px;align-items:center;}
.heart{font-size:1.7rem;transition:all .3s;filter:drop-shadow(0 0 6px #ff3355);}
.heart.lost{filter:grayscale(1);transform:scale(.75);opacity:.5;}
.hud-score{font-family:'Fredoka One',cursive;color:var(--yellow);font-size:1.5rem;text-shadow:2px 2px 0 rgba(0,0,0,.8);}
.hud-mid{display:flex;flex-direction:column;align-items:center;gap:2px;}
.hud-level{font-family:'Fredoka One',cursive;color:white;font-size:1rem;text-shadow:2px 2px 0 rgba(0,0,0,.8);}
.hud-weapon{font-size:1.4rem;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.3);}

/* PROGRESS */
#progressBar{position:fixed;top:68px;left:10px;right:10px;height:6px;background:rgba(255,255,255,.1);border-radius:10px;z-index:1000;overflow:hidden;}
#progressFill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:10px;transition:width .4s ease;box-shadow:0 0 8px var(--pink);}

/* CANVAS */
#gameCanvas{position:absolute;inset:0;width:100%;height:100%;}

/* LEVEL INTRO */
#levelIntro{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;flex-direction:column;
  align-items:center;justify-content:center;z-index:3000;}
#levelIntro.active{display:flex;}
.lv-emoji{font-size:4rem;animation:lvSpin 2s ease-in-out infinite;}
@keyframes lvSpin{0%,100%{transform:scale(1) rotate(-5deg);}50%{transform:scale(1.2) rotate(5deg);}}
.lv-num{font-family:'Fredoka One',cursive;font-size:clamp(1rem,4vw,1.6rem);color:rgba(255,255,255,.6);margin:8px 0;}
.lv-title{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,7vw,3.5rem);color:var(--yellow);
  text-shadow:3px 3px 0 var(--orange),0 0 25px rgba(244,208,63,.5);text-align:center;
  animation:lvPop .6s cubic-bezier(.175,.885,.32,1.275);}
@keyframes lvPop{from{transform:scale(0) rotate(-10deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.lv-story{color:rgba(255,255,255,.85);font-size:clamp(.95rem,2.5vw,1.2rem);margin-top:12px;text-align:center;
  max-width:500px;line-height:1.6;padding:0 20px;}
.lv-hint{color:var(--green);font-size:1rem;margin-top:14px;background:rgba(255,255,255,.08);
  padding:8px 20px;border-radius:20px;border:1px solid rgba(88,214,141,.3);}

/* WIN */
#winScreen{flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse,#1a4a2e 0%,#0a1a10 100%);text-align:center;overflow:hidden;}
.win-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,8vw,4rem);color:var(--yellow);
  text-shadow:3px 3px 0 var(--orange);margin-bottom:15px;animation:winBounce .5s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes winBounce{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.stars-row{font-size:3.5rem;margin:15px 0;letter-spacing:8px;}
.confetti-p{position:absolute;border-radius:2px;animation:cFall linear infinite;pointer-events:none;}
@keyframes cFall{from{transform:translateY(-20px) rotate(0);opacity:1;}to{transform:translateY(100vh) rotate(720deg);opacity:0;}}

/* GAMEOVER */
#gameOverScreen{flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse,#4a1a1a 0%,#1a0a0a 100%);text-align:center;}
.go-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,7vw,4rem);color:var(--pink);
  text-shadow:3px 3px 0 #8b0000;margin-bottom:15px;}

/* BUTTONS */
.game-btn{font-family:'Fredoka One',cursive;font-size:1.4rem;padding:13px 45px;border:none;
  border-radius:50px;cursor:pointer;margin:8px;transition:all .1s;text-shadow:2px 2px 0 rgba(0,0,0,.3);}
.game-btn:active{transform:translateY(3px);}
.btn-green{background:linear-gradient(135deg,var(--green),#27ae60);color:white;box-shadow:0 6px 0 #1e8449;}
.btn-red{background:linear-gradient(135deg,var(--orange),#e74c3c);color:white;box-shadow:0 6px 0 #c0392b;}
.btn-blue{background:linear-gradient(135deg,var(--sky),#2980b9);color:white;box-shadow:0 6px 0 #1a5276;}

/* MOBILE CONTROLS */
#mobileControls{position:fixed;bottom:18px;left:0;right:0;display:flex;
  justify-content:space-between;padding:0 18px;z-index:500;pointer-events:none;}
.ctrl-grp{display:flex;gap:10px;pointer-events:all;}
.ctrl-btn{width:72px;height:72px;border-radius:50%;border:2px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.13);backdrop-filter:blur(8px);font-size:1.7rem;cursor:pointer;
  color:white;touch-action:none;-webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;user-select:none;outline:none;transition:none;}
.ctrl-btn.pressed{background:rgba(255,255,255,.45);transform:scale(.93);}
.ctrl-shoot{background:rgba(255,100,100,.22);border-color:rgba(255,100,100,.55);}

/* POPUPS */
.score-pop{position:fixed;font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--yellow);
  text-shadow:2px 2px 0 rgba(0,0,0,.8);pointer-events:none;z-index:900;
  animation:sPop 1s ease-out forwards;}
@keyframes sPop{from{opacity:1;transform:translateY(0) scale(1);}to{opacity:0;transform:translateY(-65px) scale(1.2);}}
.msg-pop{position:fixed;font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--green);
  text-shadow:0 0 20px var(--green),2px 2px 0 rgba(0,0,0,.8);pointer-events:none;z-index:900;
  top:50%;left:50%;transform:translate(-50%,-50%);animation:msgPop 1.5s ease-out forwards;}
@keyframes msgPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}70%{opacity:1;}100%{opacity:0;transform:translate(-50%,-70%) scale(.9);}}
.dmg-flash{position:fixed;inset:0;background:rgba(255,0,0,.38);pointer-events:none;z-index:2000;animation:flashOut .35s ease-out forwards;}
@keyframes flashOut{to{opacity:0;}}
.heal-flash{position:fixed;inset:0;background:rgba(0,255,100,.22);pointer-events:none;z-index:2000;animation:flashOut .5s ease-out forwards;}
</style>
</head>
<body>

<!-- TITLE -->
<div id="titleScreen" class="screen active">
  <div class="stars-bg" id="starsBg"></div>
  <div id="floatIcons"></div>
  <div class="title-container">
    <div class="title-char">
      <svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg" width="160" height="200">

        <path d="M86 72 Q93 68 100 72" stroke="#3d1c00" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <ellipse cx="80" cy="92" rx="3" ry="2" fill="#d4956e" opacity=".4"/>
        <!-- Smile -->
        <path d="M71 98 Q80 106 89 98" stroke="#c47a5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Cheeks -->
        <ellipse cx="58" cy="94" rx="8" ry="5" fill="#ffb3ba" opacity=".4"/>
        <ellipse cx="102" cy="94" rx="8" ry="5" fill="#ffb3ba" opacity=".4"/>
        <!-- Flower -->
        <circle cx="118" cy="72" r="9" fill="#FF6B9D"/>
        <circle cx="118" cy="72" r="4" fill="#FFD93D"/>
        <!-- Arms -->
        <rect x="18" y="115" width="33" height="14" rx="7" fill="#5a7fa8"/>
        <rect x="109" y="115" width="33" height="14" rx="7" fill="#5a7fa8"/>
      </svg>
    </div>
    <div class="game-title">🌸 مغامرات تنال 🌸</div>
    <div class="title-sub">✨ خمس مغامرات رائعة تنتظرك! ✨</div>
    <button class="start-btn" onclick="startGame()">▶ ابدأ المغامرة</button>
  </div>
</div>

<!-- HUD -->
<div id="gameHUD" style="display:none">
  <div class="hud-lives" id="livesEl"></div>
  <div class="hud-mid">
    <div class="hud-level" id="levelEl">المرحلة 1</div>
    <div class="hud-weapon" id="weaponEl">🌸 بدون سلاح</div>
  </div>
  <div class="hud-score" id="scoreEl">⭐ 0</div>
</div>
<div id="progressBar" style="display:none"><div id="progressFill" style="width:0%"></div></div>

<!-- CANVAS -->
<canvas id="gameCanvas" class="screen"></canvas>

<!-- LEVEL INTRO -->
<div id="levelIntro">
  <div class="lv-emoji" id="lvEmoji">🌸</div>
  <div class="lv-num" id="lvNum">المرحلة 1 من 5</div>
  <div class="lv-title" id="lvTitle">مرعى الزهور</div>
  <div class="lv-story" id="lvStory"></div>
  <div class="lv-hint" id="lvHint"></div>
</div>

<!-- WIN -->
<div id="winScreen" class="screen">
  <div style="font-size:5rem;margin-bottom:10px;animation:charFloat 2s infinite">🏆</div>
  <div class="win-title">🎊 بطلة المغامرات يا تنال! 🎊</div>
  <div style="color:white;font-size:1.3rem">أكملتِ كل المراحل الخمس!</div>
  <div class="stars-row" id="finalStars">⭐⭐⭐</div>
  <div style="color:var(--yellow);font-family:'Fredoka One';font-size:1.8rem;margin:10px 0" id="finalScoreEl"></div>
  <button class="game-btn btn-blue" onclick="restartFromTitle()">🏠 القائمة الرئيسية</button>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" class="screen">
  <div style="font-size:4rem">💔</div>
  <div class="go-title">انتهت اللعبة!</div>
  <div style="color:white;font-size:1.1rem;margin-bottom:20px">لا تستسلمي يا تنال، حاولي مجدداً! 💪</div>
  <button class="game-btn btn-green" onclick="retryLevel()">🔄 حاولي مجدداً</button>
  <button class="game-btn btn-red" onclick="restartFromTitle()">🏠 القائمة</button>
</div>

<!-- MOBILE CONTROLS -->
<div id="mobileControls" style="display:none">
  <div class="ctrl-grp">
    <button class="ctrl-btn" id="btnL">◀</button>
    <button class="ctrl-btn" id="btnR">▶</button>
  </div>
  <div class="ctrl-grp">
    <button class="ctrl-btn ctrl-shoot" id="btnShoot">🌸</button>
    <button class="ctrl-btn" id="btnJump">⬆</button>
  </div>
</div>

    collectEmoji:'🍭', collectColor:'#FF69B4',
    enemyTypes:[{e:'👿',spd:1.2,pts:300},{e:'🎃',spd:1.0,pts:250}],

const JUMPBUF_FRAMES = 6;  // ~0.10s at 60fps

function loadLevel(idx){

  cameraX=0; levelComplete=false; collectCount=0;
  particles=[]; bullets=[];

  generateLevel(lv);

  // Show HUD
  document.getElementById('gameHUD').style.display='flex';

// =============================================================
//  LEVEL GENERATION — well-spaced, reachable platforms
// =============================================================
function generateLevel(lv){
  platforms=[]; collectibles=[]; enemies=[];
  powerups=[]; weapons_pick=[]; bgObjects=[];

  const ch=canvas.height, gY=ch-55;
  const sp=lv.speedMult;

  // === GROUND SECTIONS (no gaps at start) ===
  let gx=0;
  // First solid ground stretch
  platforms.push({x:0,y:gY,w:500,h:55,type:'ground'});
  gx=500;
  while(gx<worldWidth-300){
    const gap=100+Math.random()*120; // gap between ground segments
    const w=180+Math.random()*250;
    platforms.push({x:gx+gap,y:gY,w:w,h:55,type:'ground'});
    gx+=gap+w;
  }
  // Goal ground at end — accessible, with bridge ground before it
  const goalX = worldWidth * 0.92;
  platforms.push({x:goalX - 300, y:gY, w:350, h:55, type:'ground'}); // bridge ground before goal
  platforms.push({x:goalX,       y:gY, w:400, h:55, type:'goal'});    // goal zone

  // === FLOATING PLATFORMS — generous spacing, reachable heights ===
  const maxJumpH=250; // how high player can jump
  const minW=lv.platformW[0], maxW=lv.platformW[1];
  const minGap=lv.platformGap[0], maxGap=lv.platformGap[1];
  const vSpread=lv.verticalSpread;

  let fx=350;
  let lastY=gY-100;
  while(fx<worldWidth-400){
    const pw=minW+Math.random()*(maxW-minW);
    const gap=minGap+Math.random()*(maxGap-minGap);
    // Height: vary but within jump reach of last platform
    let py=lastY - (-80+Math.random()*180); // -80 to +100 from last
    py=Math.max(ch*0.15, Math.min(gY-80, py)); // clamp
    const ph=lv.platformH[0]+Math.random()*(lv.platformH[1]-lv.platformH[0]);
    platforms.push({x:fx,y:py,w:pw,h:ph,type:'float',colorIdx:Math.floor(Math.random()*2)});
    lastY=py;
    fx+=pw+gap;
  }

  // === COLLECTIBLES on/above platforms ===
  const floats=platforms.filter(p=>p.type==='float'||p.type==='ground').slice(0,40);
  for(let i=0;i<lv.nCollect+8;i++){
    const p=floats[Math.floor(Math.random()*floats.length)];
    const cx=p.x+20+Math.random()*(p.w-40);
    const cy=p.y-40-Math.random()*60;
    collectibles.push({x:cx,y:cy,col:false,bob:Math.random()*Math.PI*2,emoji:lv.collectEmoji});
  }

  // === POWERUPS (hearts) ===
  for(let i=0;i<lv.nPowerups;i++){
    const p=floats[Math.floor(Math.random()*floats.length)];
    const px=p.x+30+Math.random()*(p.w-60);
    const py=p.y-50;
    powerups.push({x:px,y:py,col:false,bob:Math.random()*Math.PI*2});
  }

  // === WEAPON PICKUPS ===
  for(let i=0;i<lv.nWeapons;i++){
    const p=floats[Math.floor(Math.random()*floats.length)];
    const wx=p.x+20+Math.random()*(p.w-40);
    const wy=p.y-50;
    weapons_pick.push({x:wx,y:wy,col:false,bob:Math.random()*Math.PI*2});
  }

  // === ENEMIES on ground platforms ===
  const gPlats=platforms.filter(p=>p.type==='ground').slice(1);
  for(let i=0;i<lv.nEnemies+2;i++){
    const et=lv.enemyTypes[Math.floor(Math.random()*lv.enemyTypes.length)];
    const p=gPlats[Math.floor(Math.random()*gPlats.length)];
    if(!p) continue;
    const ex=p.x+40+Math.random()*(Math.max(0,p.w-80));
    const ey=p.y-36;
    const dir=Math.random()>.5?1:-1;
    enemies.push({
      x:ex,y:ey,w:36,h:36,
      vx:et.spd*sp*dir,
      startX:ex,range:120+Math.random()*160,
      emoji:et.e,pts:et.pts,
      dead:false,hp:1,hitTimer:0,
      deathTimer:0
    });
  }

  // === BG DECOR OBJECTS ===
  for(let i=0;i<60;i++){
    bgObjects.push({
      x:Math.random()*worldWidth,
      y:50+Math.random()*(canvas.height*0.7),
      emoji:lv.bgObjects[Math.floor(Math.random()*lv.bgObjects.length)],
      layer:0.2+Math.random()*0.5,
      size:1+Math.random()*1.5
    });
  }
}

// =============================================================
//  GAME LOOP
// =============================================================
function gameLoop(){
  update();
  render();
  if(!levelComplete) animFrame=requestAnimationFrame(gameLoop);
}

function celebrationLoop(){
  render(); // keep drawing overlay + particles
  animFrame=requestAnimationFrame(celebrationLoop);
}

// =============================================================
//  UPDATE
// =============================================================
function update(){
  if(levelComplete) return;

  const lv=LEVELS[currentLevel];

  // Player animation
  P.fTimer++;
  if(P.fTimer>10){ P.frame=(P.frame+1)%4; P.fTimer=0; }

  // Blink when invincible
  if(P.invincible>0){ P.invincible--; P.blinkOn=(P.invincible%8)<4; }
  else P.blinkOn=true;

  // Horizontal movement — smooth acceleration
  const targetVx = keys.left?-MOVE_SPEED:keys.right?MOVE_SPEED:0;
  P.vx += (targetVx - P.vx) * 0.2;
  if(Math.abs(P.vx)>.05 && targetVx===0) P.vx*=0.8;
  if(keys.left) P.facing=-1;
  if(keys.right) P.facing=1;

  // Gravity
  P.vy+=GRAVITY;
  P.vy=Math.min(P.vy,18);
  P.x+=P.vx;
  P.y+=P.vy;

  // --- Coyote Time + Jump Buffer (frame-based) ---
  // Refresh coyote window if we were grounded in the previous frame,
  // then decay both timers each frame.
  if (P.onGround) P.coyote = COYOTE_FRAMES;
  P.coyote = Math.max(0, P.coyote - 1);
  P.jumpBuf = Math.max(0, P.jumpBuf - 1);

  // Recompute grounded state this frame via collisions:
  P.onGround=false;

  // Platform collision
  for(const p of platforms){
    if(P.x+P.w>p.x && P.x<p.x+p.w &&
       P.y+P.h>p.y && P.y+P.h<p.y+p.h+12 && P.vy>=0){
      P.y=p.y-P.h;
      P.vy=0;
      P.onGround=true;
      P.coyote = COYOTE_FRAMES; // landing refresh
    }
    // Head bump
    if(P.x+P.w>p.x+4 && P.x<p.x+p.w-4 &&
       P.y>p.y+p.h-8 && P.y<p.y+p.h+8 && P.vy<0){
      P.vy=0;
    }
  }

  // Execute buffered jump if allowed (ground OR coyote window)
  if (P.jumpBuf > 0 && (P.onGround || P.coyote > 0)) {
    P.vy = JUMP_FORCE;
    P.onGround = false;
    P.coyote = 0;
    P.jumpBuf = 0;
    spawnParticles(P.x+P.w/2,P.y+P.h,'✨',3);
  }

  // Reached goal zone (last 8% of world) — require collecting the goal first
  if(!levelComplete && P.x > worldWidth * 0.92){
    if (collectCount >= lv.nCollect) {
      triggerLevelComplete();
    } else {
      // Gentle reminder (rate-limited)
      if(!update._needMsg || (Date.now() - update._needMsg) > 1200){
        update._needMsg = Date.now();
        const left = Math.max(0, lv.nCollect - collectCount);
        spawnMsg(`اجمعي ${left} ${lv.collectEmoji} بعد!`);
      }
    }
  }

  // Fell off
  if(P.y>canvas.height+80){ takeDamage(); respawnPlayer(); }
  if(P.x<0){ P.x=0; P.vx=0; }
  if(P.x>worldWidth-P.w){ P.x=worldWidth-P.w; P.vx=0; }

  // === COLLECTIBLES ===
  for(const c of collectibles){
    if(c.col) continue;
    c.bob+=0.06;
    if(dist(P,c)<34){ c.col=true; collectCount++; score+=100; spawnScorePop(c.x-cameraX,c.y,'+100'); spawnParticles(c.x,c.y,c.emoji,5); updateHUD(); }
  }

  // === POWERUPS (hearts) ===
  for(const pw of powerups){
    if(pw.col) continue;
    pw.bob+=0.07;
    if(dist(P,{x:pw.x,y:pw.y})<36){
      pw.col=true;
      if(lives<5){ lives++; showHealFlash(); spawnMsg('❤️ +قلب!'); }
      else { score+=300; spawnMsg('💖 +300 نقطة!'); }
      updateHUD();
      spawnParticles(pw.x,pw.y,'❤️',8);
    }
  }

  // === WEAPON PICKUPS ===
  for(const wp of weapons_pick){
    if(wp.col) continue;
    wp.bob+=0.07;
    if(dist(P,{x:wp.x,y:wp.y})<36){
      wp.col=true;
      hasWeapon=true;
      weaponCount+=5;
      spawnMsg(`${lv.weaponEmoji} ${lv.weaponName}!`);
      updateHUD();
      spawnParticles(wp.x,wp.y,lv.weaponEmoji,6);
    }
  }

  // === BULLETS ===
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx;
    b.life--;
    if(b.life<=0||b.x<cameraX-50||b.x>cameraX+canvas.width+50){ bullets.splice(i,1); continue; }
    // Bullet hits enemy
    for(const e of enemies){
      if(e.dead) continue;
      if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
        killEnemy(e,b.x-cameraX,b.y);
        bullets.splice(i,1);
        break;
      }
    }
  }

  // === ENEMIES ===
  for(const e of enemies){
    if(e.dead){ e.deathTimer++; continue; }
    if(e.hitTimer>0) e.hitTimer--;
    e.x+=e.vx;
    if(Math.abs(e.x-e.startX)>e.range) e.vx*=-1;
    // Platform boundaries
    let onGr=false;
    for(const p of platforms){
      if(e.x+e.w>p.x&&e.x<p.x+p.w&&e.y+e.h>=p.y&&e.y+e.h<=p.y+p.h+5){
        e.y=p.y-e.h; onGr=true; break;
      }
    }
    if(!onGr) e.y+=GRAVITY;

    if(P.invincible>0) continue;
    // Overlap
    if(P.x+P.w-6>e.x&&P.x+6<e.x+e.w&&P.y+P.h-6>e.y&&P.y+6<e.y+e.h){
      // Stomp from above
      if(P.vy>1 && P.y+P.h<e.y+e.h*0.5){
        killEnemy(e,e.x-cameraX+e.w/2,e.y);
        P.vy=JUMP_FORCE*0.55;
        score+=e.pts*2;
        spawnScorePop(e.x-cameraX,e.y,`+${e.pts*2} 💥`);
        updateHUD();
      } else {
        takeDamage();
      }
    }
  }

  // === PARTICLES ===
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; });

  // Camera smooth follow
  const targetCam=P.x-canvas.width*0.38;
  cameraX+=(targetCam-cameraX)*0.1;
  cameraX=Math.max(0,Math.min(worldWidth-canvas.width,cameraX));

  // Progress
  document.getElementById('progressFill').style.width=Math.min(100,P.x/worldWidth*100)+'%';
}

function dist(a,b){ return Math.hypot((a.x+a.w/2)-(b.x),(a.y+a.h/2)-(b.y)); }

function killEnemy(e,sx,sy){
  e.dead=true; e.deathTimer=0;
  spawnParticles(e.x+e.w/2,e.y+e.h/2,'💥',6);
  score+=e.pts; updateHUD();
}

function respawnPlayer(){
  // Find safe spot near player's progress
  const px=Math.min(P.x,worldWidth-400);
  const safe=platforms.find(p=>p.type==='ground'&&p.x<px&&p.x+p.w>px-200);
  if(safe){ P.x=safe.x+50; P.y=safe.y-P.h-10; }
  else { P.x=120; P.y=canvas.height-200; }
  P.vx=0; P.vy=0;
}

function takeDamage(){
  if(P.invincible>0) return;
  lives--;
  P.invincible=90;
  updateHUD();
  const f=document.createElement('div'); f.className='dmg-flash'; document.body.appendChild(f);
  setTimeout(()=>f.remove(),350);
  if(lives<=0) showGameOver();
}

function doJump(){
  // Jump Buffer: store jump request for a few frames
  P.jumpBuf = JUMPBUF_FRAMES;
}


function doShoot(){
  const lv=LEVELS[currentLevel];
  if(!hasWeapon||weaponCount<=0) return;
  weaponCount--;
  if(weaponCount<=0) hasWeapon=false;
  updateHUD();
  bullets.push({
    x:P.x+P.w/2,y:P.y+P.h*0.4,
    vx:P.facing*12,
    life:60,
    emoji:lv.weaponEmoji
  });
  spawnParticles(P.x+P.w/2,P.y+P.h*0.4,lv.weaponEmoji,2);
}

function triggerLevelComplete(){
  if(levelComplete) return;
  levelComplete=true;
  cancelAnimationFrame(animFrame);
  animFrame=null;
  score+=collectCount*80;
  updateHUD();
  // Celebration particles
  for(let i=0;i<20;i++){
    setTimeout(()=>spawnParticles(
      cameraX + Math.random()*canvas.width,
      Math.random()*canvas.height*0.6,
      ['🎉','⭐','🌸','💖','✨'][Math.floor(Math.random()*5)], 4
    ), i*80);
  }
  // Run celebration render loop to show overlay + particles
  celebrationLoop();
  // Advance level after 2.5s
  setTimeout(()=>{
    cancelAnimationFrame(animFrame);
    animFrame=null;
    currentLevel++;
    if(currentLevel>=LEVELS.length) showWin();
    else loadLevel(currentLevel);
  }, 2500);
}

function showWin(){
  cancelAnimationFrame(animFrame);
  document.getElementById('gameHUD').style.display='none';
  document.getElementById('progressBar').style.display='none';
  document.getElementById('mobileControls').style.display='none';
  document.getElementById('finalScoreEl').textContent=`مجموع نقاطك: ${score} ⭐`;
  document.getElementById('finalStars').textContent=score>8000?'⭐⭐⭐':score>4000?'⭐⭐':'⭐';
  spawnConfetti();
  showScreen('winScreen');
}

function showGameOver(){
  cancelAnimationFrame(animFrame);
  document.getElementById('gameHUD').style.display='none';
  document.getElementById('progressBar').style.display='none';
  document.getElementById('mobileControls').style.display='none';
  showScreen('gameOverScreen');
}

// =============================================================
//  RENDER
// =============================================================
function render(){
  const lv=LEVELS[currentLevel];
  const W=canvas.width, H=canvas.height;

  // Sky gradient
  const skyG=ctx.createLinearGradient(0,0,0,H);
  skyG.addColorStop(0,lv.sky[0]);
  skyG.addColorStop(1,lv.sky[1]);
  ctx.fillStyle=skyG;
  ctx.fillRect(0,0,W,H);

  // BG objects (parallax)
  ctx.font='1.6rem serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const o of bgObjects){
    const sx=o.x-cameraX*o.layer;
    if(sx<-60||sx>W+60) continue;
    ctx.globalAlpha=0.18+o.layer*0.2;
    ctx.font=`${o.size}rem serif`;
    ctx.fillText(o.emoji,sx,o.y);
  }
  ctx.globalAlpha=1;

  ctx.save();
  ctx.translate(-cameraX,0);

  // Goal visual
  const goal=platforms.find(p=>p.type==='goal');
  if(goal) drawGoalFlag(goal);

  // Platforms
  for(const p of platforms){
    if(p.x+p.w<cameraX-10||p.x>cameraX+W+10) continue;
    drawPlatform(p,lv);
  }

  // Collectibles
  for(const c of collectibles){
    if(c.col||c.x<cameraX-60||c.x>cameraX+W+60) continue;
    const by=Math.sin(c.bob)*7;
    ctx.shadowColor=lv.collectColor; ctx.shadowBlur=14;
    ctx.font='1.6rem serif'; ctx.textAlign='center';
    ctx.fillText(c.emoji,c.x,c.y+by);
    ctx.shadowBlur=0;
  }

  // Powerups (hearts)
  for(const pw of powerups){
    if(pw.col||pw.x<cameraX-60||pw.x>cameraX+W+60) continue;
    const by=Math.sin(pw.bob)*8;
    ctx.shadowColor='#ff3355'; ctx.shadowBlur=18;
    ctx.font='1.8rem serif'; ctx.textAlign='center';
    ctx.fillText('❤️',pw.x,pw.y+by);
    ctx.shadowBlur=0;
    // Glow ring
    ctx.strokeStyle='rgba(255,80,100,.4)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(pw.x,pw.y+by,18,0,Math.PI*2); ctx.stroke();
  }

  // Weapon pickups
  for(const wp of weapons_pick){
    if(wp.col||wp.x<cameraX-60||wp.x>cameraX+W+60) continue;
    const by=Math.sin(wp.bob)*6;
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=16;
    ctx.font='1.8rem serif'; ctx.textAlign='center';
    ctx.fillText(lv.weaponEmoji,wp.x,wp.y+by);
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,215,0,.5)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(wp.x,wp.y+by,20,0,Math.PI*2); ctx.stroke();
  }

  // Bullets
  for(const b of bullets){
    ctx.font='1.4rem serif'; ctx.textAlign='center';
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=10;
    ctx.fillText(b.emoji,b.x,b.y);
    ctx.shadowBlur=0;
  }

  // Enemies
  for(const e of enemies){
    if(e.x+e.w<cameraX-60||e.x>cameraX+W+60) continue;
    if(e.dead){
      if(e.deathTimer<20){
        ctx.globalAlpha=1-e.deathTimer/20;
        ctx.font='2rem serif'; ctx.textAlign='center';
        ctx.fillText('💥',e.x+e.w/2,e.y-e.deathTimer*2);
        ctx.globalAlpha=1;
      }
      continue;
    }
    // Shadow
    ctx.fillStyle='rgba(0,0,0,.25)';
    ctx.beginPath(); ctx.ellipse(e.x+e.w/2,e.y+e.h+2,16,5,0,0,Math.PI*2); ctx.fill();
    // Enemy
    if(e.hitTimer>0) ctx.globalAlpha=0.5;
    ctx.font='2.1rem serif'; ctx.textAlign='center';
    ctx.fillText(e.emoji,e.x+e.w/2,e.y+e.h/2+4);
    ctx.globalAlpha=1;
  }

  // Particles
  for(const p of particles){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.font=`${p.sz}rem serif`; ctx.textAlign='center';
    ctx.fillText(p.e,p.x,p.y);
  }
  ctx.globalAlpha=1;

  // Player
  if(P.blinkOn) drawPlayer(lv);

  ctx.restore();

  // Level complete overlay
  if(levelComplete){
    ctx.fillStyle='rgba(0,0,0,0.72)';
    ctx.fillRect(0,0,W,H);
    // Animate particles
    particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; });
    for(const p of particles){
      if(p.life<=0) continue;
      ctx.globalAlpha=p.life/p.maxLife;
      ctx.font=`${p.sz}rem serif`; ctx.textAlign='center';
      ctx.fillText(p.e,p.x,p.y);
    }
    ctx.globalAlpha=1;
    const sz=Math.min(W*.09,52);
    ctx.font=`bold ${sz}px 'Fredoka One',cursive`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#FF6B9D'; ctx.shadowBlur=35;
    ctx.fillStyle='#FFD700';
    ctx.fillText('🎉 أحسنتِ يا تنال! 🎉',W/2,H/2-20);
    ctx.font=`bold ${sz*0.55}px 'Fredoka One',cursive`;
    ctx.fillStyle='white'; ctx.shadowBlur=0;
    ctx.fillText('جاري الانتقال للمرحلة التالية...',W/2,H/2+50);
  }

  // Arrow indicator pointing to goal (when goal is off-screen to the right)
  if(!levelComplete){
    const goalX = worldWidth * 0.92;
    const goalScreenX = goalX - cameraX;
    if(goalScreenX > W - 20){
      // Goal is off-screen to the right — draw pulsing arrow
      const pulse = 0.6 + Math.sin(Date.now()*0.005)*0.4;
      ctx.globalAlpha = pulse;
      ctx.font = '2rem serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText('🏁 ➡️', W - 10, H/2);
      ctx.globalAlpha = 1;
      // Distance bar
      const pct = Math.min(1, P.x / goalX);
      ctx.fillStyle='rgba(0,0,0,.4)';
      ctx.fillRect(W/2-100,8,200,10);
      const barG=ctx.createLinearGradient(W/2-100,0,W/2+100,0);
      barG.addColorStop(0,'#FF6B9D'); barG.addColorStop(1,'#FFD700');
      ctx.fillStyle=barG;
      ctx.fillRect(W/2-100,8,200*pct,10);
      ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1;
      ctx.strokeRect(W/2-100,8,200,10);
      ctx.font='bold 11px Tajawal'; ctx.fillStyle='white';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('🏁 الهدف',W/2,28);
    }
  }
}

// =============================================================
//  DRAW FUNCTIONS
// =============================================================
function drawPlatform(p,lv){
  const r=p.type==='ground'?0:8;
  const cols=lv.platformColors[p.colorIdx||0];

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath(); rr(p.x+4,p.y+6,p.w,p.h,r); ctx.fill();

  // Gradient body
  const g=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
  g.addColorStop(0,cols[0]); g.addColorStop(1,cols[1]);
  ctx.fillStyle=g;
  ctx.beginPath(); rr(p.x,p.y,p.w,p.h,r); ctx.fill();

  // Top sheen
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.beginPath(); rr(p.x+2,p.y+2,p.w-4,6,r); ctx.fill();

  // Ground texture dots
  if(p.type==='ground'){
    ctx.fillStyle='rgba(0,0,0,.06)';
    for(let i=0;i<Math.floor(p.w/30);i++){
      ctx.beginPath(); ctx.arc(p.x+15+i*30,p.y+30,6,0,Math.PI*2); ctx.fill();
    }
  }
}

function drawGoalFlag(goal){
  const gx=goal.x+goal.w*0.5, gy=goal.y;

  // Goal zone glow on ground
  const glowG=ctx.createLinearGradient(goal.x,gy-30,goal.x,gy+goal.h);
  glowG.addColorStop(0,'rgba(255,215,0,0.25)');
  glowG.addColorStop(1,'rgba(255,215,0,0)');
  ctx.fillStyle=glowG;
  ctx.fillRect(goal.x,gy-30,goal.w,goal.h+30);

  // Animated stars above goal
  const t=Date.now()*0.002;
  for(let i=0;i<5;i++){
    const sx=goal.x+goal.w*0.1+i*(goal.w*0.2);
    const sy=gy-60+Math.sin(t+i)*15;
    ctx.font='1.2rem serif'; ctx.textAlign='center';
    ctx.globalAlpha=0.5+Math.sin(t+i)*0.5;
    ctx.fillText('⭐',sx,sy);
  }
  ctx.globalAlpha=1;

  // Pole
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=5;
  ctx.shadowColor='#FFD700'; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.moveTo(gx,gy); ctx.lineTo(gx,gy-110); ctx.stroke();
  ctx.shadowBlur=0;

  // Flag wave
  const wave=Math.sin(Date.now()*0.004)*7;
  ctx.fillStyle='#FF6B9D';
  ctx.beginPath();
  ctx.moveTo(gx,gy-110);
  ctx.quadraticCurveTo(gx+28+wave,gy-92,gx,gy-74);
  ctx.fill();
  ctx.font='1.1rem serif'; ctx.textAlign='center';
  ctx.fillText('⭐',gx+14+wave/2,gy-92);

  // "الهدف" text above flag
  ctx.font='bold 14px Tajawal'; ctx.fillStyle='#FFD700';
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=4;
  ctx.fillText('🏁 الهدف',gx,gy-118);
  ctx.shadowBlur=0;
}

function drawPlayer(lv){
  const px=P.x, py=P.y, pw=P.w, ph=P.h;
  const cx=px+pw/2;
  const isMoving=Math.abs(P.vx)>0.5;
  const legSwing=isMoving?Math.sin(P.frame*Math.PI/2)*9:0;

  ctx.save();
  if(P.facing===-1){ ctx.translate(cx*2,0); ctx.scale(-1,1); }

  // Shadow on ground
  ctx.fillStyle='rgba(0,0,0,.22)';
  ctx.beginPath(); ctx.ellipse(cx,py+ph+4,17,5,0,0,Math.PI*2); ctx.fill();

  // LEG 1
  ctx.fillStyle='#4a5568';
  ctx.beginPath(); ctx.roundRect(cx-12,py+ph-14+legSwing,11,22,5); ctx.fill();
  // LEG 2
  ctx.beginPath(); ctx.roundRect(cx+1,py+ph-14-legSwing,11,22,5); ctx.fill();
  // SHOES
  ctx.fillStyle='#2d3748';
  ctx.beginPath(); ctx.ellipse(cx-6,py+ph+8+legSwing,11,5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+7,py+ph+8-legSwing,11,5,0,0,Math.PI*2); ctx.fill();

  // BODY — denim jacket
  ctx.fillStyle='#5a7fa8';
  ctx.beginPath(); ctx.roundRect(cx-18,py+ph*.32,36,ph*.5,6); ctx.fill();
  // Jacket collar
  ctx.fillStyle='#4a6f98';
  ctx.beginPath(); ctx.moveTo(cx-8,py+ph*.32); ctx.lineTo(cx,py+ph*.4); ctx.lineTo(cx+8,py+ph*.32); ctx.closePath(); ctx.fill();
  // White shirt showing
  ctx.fillStyle='#f0f0f0';
  ctx.beginPath(); ctx.roundRect(cx-7,py+ph*.38,14,ph*.26,3); ctx.fill();
  // Yellow patch
  ctx.fillStyle='#F4D03F';
  ctx.beginPath(); ctx.roundRect(cx-17,py+ph*.48,15,11,3); ctx.fill();
  ctx.fillStyle='#333'; ctx.font='5px Arial'; ctx.textAlign='center';
  ctx.fillText('Just',cx-9,py+ph*.53);
  ctx.fillText('Enjoy',cx-9,py+ph*.58);

  // NECK
  ctx.fillStyle='#e8b9a0';
  ctx.beginPath(); ctx.roundRect(cx-5,py+ph*.27,10,12,4); ctx.fill();

  // HEAD
  ctx.fillStyle='#e8b9a0';
  ctx.beginPath(); ctx.ellipse(cx,py+ph*.16,17,19,0,0,Math.PI*2); ctx.fill();

  // HAIR — dark brown bob
  ctx.fillStyle='#3d1c00';
  ctx.beginPath(); ctx.ellipse(cx,py+ph*.08,19,15,0,0,Math.PI*2); ctx.fill();
  // Bangs
  ctx.beginPath(); ctx.roundRect(cx-19,py+ph*.06,38,11,5); ctx.fill();
  // Hair sides
  ctx.beginPath(); ctx.ellipse(cx-16,py+ph*.18,7,15,0.15,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+16,py+ph*.18,7,15,-0.15,0,Math.PI*2); ctx.fill();
  // Highlight
  ctx.fillStyle='rgba(100,60,0,.3)';
  ctx.beginPath(); ctx.ellipse(cx+2,py+ph*.06,10,6,0.2,0,Math.PI*2); ctx.fill();

  // EYES
  const ey=py+ph*.185;
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.ellipse(cx-6,ey,5,6.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+6,ey,5,6.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a0805';
  ctx.beginPath(); ctx.arc(cx-5,ey,3.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+7,ey,3.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(cx-4,ey-1.2,1.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+8,ey-1.2,1.4,0,Math.PI*2); ctx.fill();
  // Eyebrows
  ctx.strokeStyle='#3d1c00'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx-10,ey-8); ctx.quadraticCurveTo(cx-5,ey-11,cx-1,ey-8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+2,ey-8); ctx.quadraticCurveTo(cx+7,ey-11,cx+11,ey-8); ctx.stroke();
  // Nose
  ctx.fillStyle='rgba(200,130,100,.35)';
  ctx.beginPath(); ctx.ellipse(cx,ey+9,2.5,1.8,0,0,Math.PI*2); ctx.fill();
  // Mouth
  ctx.strokeStyle='#c47a5a'; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.arc(cx,ey+12,5.5,.1,Math.PI-.1); ctx.stroke();
  // Cheeks
  ctx.fillStyle='rgba(255,150,180,.32)';
  ctx.beginPath(); ctx.ellipse(cx-11,ey+6,6,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+11,ey+6,6,4,0,0,Math.PI*2); ctx.fill();

  // Flower in hair
  ctx.font='0.8rem serif'; ctx.textAlign='center';
  ctx.fillText('🌸',cx+14,py+ph*.04);

  // Weapon in hand if equipped
  if(hasWeapon){
    ctx.font='1.1rem serif';
    ctx.fillText(LEVELS[currentLevel].weaponEmoji,cx+20,py+ph*.45);
  }

  ctx.restore();
}

function rr(x,y,w,h,r){
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// =============================================================
//  PARTICLES & UI EFFECTS
// =============================================================
function spawnParticles(wx,wy,emoji,n){
  for(let i=0;i<n;i++){
    particles.push({x:wx,y:wy,vx:(Math.random()-.5)*5,vy:-2-Math.random()*4,e:emoji,life:35,maxLife:35,sz:1.1});
  }
}

function spawnScorePop(sx,sy,txt){
  const el=document.createElement('div');
  el.className='score-pop';
  el.style.cssText=`left:${sx}px;top:${sy}px;`;
  el.textContent=txt;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function spawnMsg(txt){
  const el=document.createElement('div');
  el.className='msg-pop';
  el.textContent=txt;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1500);
}

function showHealFlash(){
  const f=document.createElement('div'); f.className='heal-flash'; document.body.appendChild(f);
  setTimeout(()=>f.remove(),500);
}

function updateHUD(){
  const lv=LEVELS[currentLevel];
  const livesEl=document.getElementById('livesEl');
  livesEl.innerHTML='';
  const maxH=Math.max(lives,3);
  for(let i=0;i<maxH;i++){
    const h=document.createElement('span');
    h.className='heart'+(i>=lives?' lost':'');
    h.textContent='❤️';
    livesEl.appendChild(h);
  }
  document.getElementById('scoreEl').textContent=`⭐ ${score}`;
  document.getElementById('levelEl').textContent=`المرحلة ${currentLevel+1}/5`;
  document.getElementById('weaponEl').textContent=hasWeapon?`${lv.weaponEmoji} ×${weaponCount}`:`🌸 بدون سلاح`;
}

function spawnConfetti(){
  const cols=['#FF6B9D','#FFD700','#5DADE2','#58D68D','#9B59B6','#E67E22','#FF4444'];
  const ws=document.getElementById('winScreen');
  for(let i=0;i<80;i++){
    const p=document.createElement('div');
    p.className='confetti-p';
    p.style.cssText=`left:${Math.random()*100}%;background:${cols[i%cols.length]};width:${8+Math.random()*10}px;height:${8+Math.random()*10}px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*2}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
    ws.appendChild(p);
  }
}

// =============================================================
//  INPUT — Pointer Events (zero delay, multi-touch, mouse+touch)
// =============================================================

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=true;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=true;
  if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')&&!e.repeat){ e.preventDefault(); doJump(); }
  if((e.code==='KeyZ'||e.code==='KeyX'||e.code==='KeyF')&&!e.repeat) doShoot();
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=false;
});

// Prevent all default touch behavior on canvas and controls (no scroll, no zoom)
document.addEventListener('touchstart', e=>{ if(e.cancelable) e.preventDefault(); }, {passive:false});
document.addEventListener('touchmove',  e=>{ if(e.cancelable) e.preventDefault(); }, {passive:false});
document.addEventListener('touchend',   e=>{ if(e.cancelable) e.preventDefault(); }, {passive:false});

// Helper: bind a button with pointerdown/pointerup/pointercancel/pointerleave
function bindBtn(id, onDown, onUp){
  const el = document.getElementById(id);
  if(!el) return;
  el.addEventListener('pointerdown', e=>{ e.preventDefault(); el.setPointerCapture(e.pointerId); el.classList.add('pressed'); onDown(); }, {passive:false});
  el.addEventListener('pointerup',   e=>{ e.preventDefault(); el.classList.remove('pressed'); if(onUp) onUp(); }, {passive:false});
  el.addEventListener('pointercancel',e=>{ el.classList.remove('pressed'); if(onUp) onUp(); });
  el.addEventListener('pointerleave', e=>{ el.classList.remove('pressed'); if(onUp) onUp(); });
}

// Wire up buttons after DOM ready
function initControls(){
  bindBtn('btnL',    ()=>{ keys.left=true; },  ()=>{ keys.left=false; });
  bindBtn('btnR',    ()=>{ keys.right=true; }, ()=>{ keys.right=false; });
  bindBtn('btnJump', ()=>{ doJump(); },  null);
  bindBtn('btnShoot',()=>{ doShoot(); }, null);
}
initControls();

window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
</script>
